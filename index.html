<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/webp" href="/logo.webp" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>EHH</title>
    <meta name="description" content="EHH Project">
    <meta name="author" content="EHH" />

    <!-- Optimization: Preconnect to Cloudinary for faster image fetching -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    
    <!-- Critical: Preload hero background image with high priority -->
    <link rel="preload" as="image" href="https://res.cloudinary.com/dbfknoyxl/image/upload/f_auto,q_auto/v1776168905/hero-bg_j8uqng.webp" type="image/webp" fetchpriority="high" />
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.webp">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@EHH" />
    <meta name="twitter:image" content="/logo.webp">
    <meta property="og:title" content="EHH">
  <meta name="twitter:title" content="EHH">
  <meta property="og:description" content="EHH Project">
  <meta name="twitter:description" content="EHH Project">
</head>

  <body>
    <div id="root">
      <style>
        body { margin: 0; background-color: #0d160f; } /* Dark forest green to match the theme */
        .initial-loader {
          position: fixed; top: 0; left: 0; right: 0; bottom: 0;
          display: flex; align-items: center; justify-content: center;
          z-index: 9999;
          background: linear-gradient(180deg, rgba(13,22,15,1) 0%, rgba(20,38,24,1) 100%);
          transition: opacity 0.5s ease-out;
        }
        .spinner {
          width: 48px; height: 48px;
          border: 4px solid rgba(255, 255, 255, 0.1);
          border-left-color: #4ade80; /* Theme secondary color */
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Instant Hero Paint */
        .critical-hero-bg {
          position: absolute;
          top: 0; left: 0; width: 100%; height: 100vh;
          background-image: url('https://res.cloudinary.com/dbfknoyxl/image/upload/f_auto,q_auto/v1776168905/hero-bg_j8uqng.webp');
          background-size: cover;
          background-position: center bottom;
          z-index: -1;
        }
      </style>
      <div class="initial-loader" id="main-loader">
        <div class="spinner"></div>
      </div>
      <div class="critical-hero-bg"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
