<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <title>EHH Nepal | Environmental & Humanitarian Help Nepal</title>
    <meta name="description" content="EHH Nepal - Earth for Human and Humanity. A youth-led movement across 77 districts of Nepal empowering students for environmental sustainability and humanitarian action." />
    <meta name="author" content="EHH Nepal" />
    <meta name="keywords" content="EHH Nepal, Environmental Help Nepal, Student Movement Nepal, Youth Empowerment, Sustainability Nepal" />

    <!-- Optimization: Preconnect to Cloudinary for faster image fetching -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    
    <!-- Critical: Preload hero background image with high priority -->
    <link rel="preload" as="image" href="https://res.cloudinary.com/dbfknoyxl/image/upload/f_auto,q_auto/v1776168905/hero-bg_j8uqng.webp" type="image/webp" fetchpriority="high" />
    
    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ehh-nepal.netlify.app/" />
    <meta property="og:title" content="EHH Nepal | Environmental & Humanitarian Help" />
    <meta property="og:description" content="Empowering the youth of Nepal to protect our planet and stand for humanity." />
    <meta property="og:image" content="https://res.cloudinary.com/dbfknoyxl/image/upload/v1776168905/hero-bg_j8uqng.webp" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://ehh-nepal.netlify.app/" />
    <meta name="twitter:title" content="EHH Nepal | Environmental & Humanitarian Help" />
    <meta name="twitter:description" content="Empowering the youth of Nepal to protect our planet and stand for humanity." />
    <meta name="twitter:image" content="https://res.cloudinary.com/dbfknoyxl/image/upload/v1776168905/hero-bg_j8uqng.webp" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "EHH Nepal",
      "alternateName": "Earth for Human and Humanity",
      "url": "https://ehh-nepal.netlify.app/",
      "logo": "https://ehh-nepal.netlify.app/logo.webp",
      "description": "A youth-led movement uniting students across Nepal for environmental and humanitarian action.",
      "sameAs": [
        "https://www.facebook.com/EHHNepal",
        "https://twitter.com/EHHNepal"
      ]
    }
    </script>
</head>

  <body>
    <div id="root">
      <style>
        body { margin: 0; background-color: #0d160f; } /* Dark forest green to match the theme */
        .initial-loader {
          position: fixed; top: 0; left: 0; right: 0; bottom: 0;
          display: flex; align-items: center; justify-content: center;
          z-index: 9999;
          background: linear-gradient(180deg, rgba(13,22,15,1) 0%, rgba(20,38,24,1) 100%);
          transition: opacity 0.5s ease-out;
        }
        .spinner {
          width: 48px; height: 48px;
          border: 4px solid rgba(255, 255, 255, 0.1);
          border-left-color: #4ade80; /* Theme secondary color */
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Instant Hero Paint */
        .critical-hero-bg {
          position: absolute;
          top: 0; left: 0; width: 100%; height: 100vh;
          background-image: url('https://res.cloudinary.com/dbfknoyxl/image/upload/f_auto,q_auto/v1776168905/hero-bg_j8uqng.webp');
          background-size: cover;
          background-position: center bottom;
          z-index: -1;
        }
      </style>
      <div class="initial-loader" id="main-loader">
        <div class="spinner"></div>
      </div>
      <div class="critical-hero-bg"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
